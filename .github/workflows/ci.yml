name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-validate:
    name: Build & validate scenarios
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check & build
        run: npm run build

      - name: Engine unit tests
        run: node dist/tests/index.js

      # Determinism gate: every scenario must go fault -> win=false,
      # reference_solution -> win=true, and pass the fairness checks.
      # A broken, unsolvable, or unfair scenario fails the build.
      - name: Validate all scenarios
        run: npm run validate

      - name: MCP server smoke test
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{}}
          {"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"list_scenarios","arguments":{}}}' \
          | node dist/mcp-server/index.js 2>/dev/null \
          | python3 -c "
          import sys, json
          for line in sys.stdin:
              d = json.loads(line)
              if d.get('id') == 2:
                  text = json.loads(d['result']['content'][0]['text'])
                  assert len(text) >= 8, f'Expected 8+ scenarios, got {len(text)}'
                  print(f'✓ MCP server returned {len(text)} scenarios')
          "
