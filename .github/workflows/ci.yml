name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-validate:
    name: Build & validate scenarios
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check & build
        run: npm run build

      # Determinism gate: every scenario must go fault -> win=false,
      # reference_solution -> win=true. A broken or unsolvable scenario
      # fails the build.
      - name: Validate all scenarios
        run: npm run validate
