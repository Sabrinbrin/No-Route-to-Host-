name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-validate:
    name: Build, test & validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install workspaces
        run: npm ci

      - name: Type-check & build (engine + packages + web)
        run: npm run build

      - name: Engine unit tests
        run: node packages/engine/dist/test/index.js

      # Determinism + fairness gate: every scenario must go fault -> win=false,
      # reference_solution -> win=true, and pass the fairness checks.
      - name: Validate all scenarios (solvable + fair)
        run: node packages/validator/dist/index.js

      - name: MCP server smoke test
        run: node scripts/smoke-mcp.mjs
