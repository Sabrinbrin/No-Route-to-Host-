ticket:
  title: Web app can't reach shared database across VPC peering
  symptom: >-
    WebApp (10.0.1.50) in vpc-prod cannot reach SharedDB (172.16.1.100) in vpc-shared. The VPC
    peering connection (pcx-prod-shared) shows status 'active'. The shared VPC route table has a
    route back to prod, but the prod side seems to be missing its peering route.
  affected_hosts:
    - web-ec2
win_condition:
  type: ping
  source: web-ec2
  destination: 172.16.1.100
  expected: success
reference_solution:
  - device: web-ec2
    commands:
      - >-
        aws ec2 create-route --route-table-id rtb-prod --destination-cidr 172.16.0.0/16 --target
        pcx-prod-shared
layout:
  web-ec2:
    x: 80
    'y': 80
  peering-link:
    x: 300
    'y': 150
  db-ec2:
    x: 520
    'y': 80


explanation:
  why: >-
    The VPC peering connection was active, but the route table in the prod VPC had no route
    pointing to the peer VPC's CIDR via the peering connection. Without the route, traffic had
    nowhere to go.
  concept: >-
    VPC Peering connects two VPCs, but it's not automatic routing — you must add routes in BOTH
    VPC route tables pointing to each other's CIDR blocks via the peering connection. It's a
    common gotcha: peering is "up" but traffic doesn't flow without routes.
  production: >-
    Always check route tables on both sides of a peering connection. Also verify there's no
    overlapping CIDR (peering won't work with overlapping address spaces). Use VPC Reachability
    Analyzer for complex multi-VPC troubleshooting.
