ticket:
  title: JumpBox can't ping the API server
  symptom: >-
    JumpBox (10.0.0.50) in the management subnet cannot ping API-Server (10.0.10.100) in the API
    subnet. Both are in the same VPC (vpc-main). The security group on the API server allows ICMP
    from 10.0.0.0/16. TCP traffic on port 443 works fine between them.
  affected_hosts:
    - jump-box
win_condition:
  type: ping
  source: jump-box
  destination: 10.0.10.100
  expected: success
reference_solution:
  - device: api-server
    commands:
      - >-
        aws ec2 create-network-acl-entry --network-acl-id acl-api --rule-number 200 --protocol icmp
        --cidr-block 10.0.0.0/16 --rule-action allow --ingress
layout:
  jump-box:
    x: 80
    'y': 80
  vpc-gw:
    x: 300
    'y': 150
  api-server:
    x: 520
    'y': 80


explanation:
  why: >-
    The NACL on the API subnet allowed TCP inbound (rule 100) but had no rule allowing ICMP
    inbound. NACLs are stateless — unlike security groups, you need explicit rules for both the
    request AND response directions.
  concept: >-
    Network ACLs are stateless subnet-level firewalls evaluated by rule number (lowest first).
    Unlike Security Groups (stateful), NACLs require explicit allow rules in both directions. A
    common mistake is adding a TCP allow but forgetting ICMP for ping.
  production: >-
    NACL issues are tricky because traffic works for some protocols but not others (since each
    protocol needs its own rule). Check both inbound AND outbound rules. Use VPC Flow Logs with
    "REJECT" filter to identify NACL blocks vs SG blocks.
