id: firewall-tunnel
title: Tunnel Up, Traffic Blackholed
difficulty: 4
topology:
  devices:
    - id: hq-host
      hostname: HQ-PC
      type: host
      interfaces:
        - name: eth0
          ip: 10.1.0.10
          mask: 255.255.255.0
          gateway: 10.1.0.1
          status: up
      routing:
        enabled: false
        routes: []
        svis: []
    - id: hq-firewall
      hostname: HQ-FW
      type: firewall
      interfaces:
        - name: port1
          ip: 10.1.0.1
          mask: 255.255.255.0
          status: up
        - name: port2
          ip: 198.51.100.1
          mask: 255.255.255.252
          status: up
        - name: tunnel0
          ip: 172.16.0.1
          mask: 255.255.255.252
          status: up
      routing:
        enabled: true
        routes:
          - network: 10.2.0.0
            mask: 255.255.255.0
            nextHop: 172.16.0.2
        svis: []
      firewallPolicies:
        - id: 1
          srcSubnet: 10.1.0.0/24
          dstSubnet: 0.0.0.0/0
          action: permit
          interface: port2
        - id: 2
          srcSubnet: 10.1.0.0/24
          dstSubnet: 10.2.0.0/24
          action: permit
          interface: tunnel0
    - id: branch-firewall
      hostname: BR-FW
      type: firewall
      interfaces:
        - name: port1
          ip: 10.2.0.1
          mask: 255.255.255.0
          status: up
        - name: port2
          ip: 198.51.100.2
          mask: 255.255.255.252
          status: up
        - name: tunnel0
          ip: 172.16.0.2
          mask: 255.255.255.252
          status: up
      routing:
        enabled: true
        routes:
          - network: 10.1.0.0
            mask: 255.255.255.0
            nextHop: 172.16.0.1
        svis: []
      firewallPolicies:
        - id: 1
          srcSubnet: 10.2.0.0/24
          dstSubnet: 0.0.0.0/0
          action: permit
          interface: port2
    - id: branch-host
      hostname: BR-PC
      type: host
      interfaces:
        - name: eth0
          ip: 10.2.0.10
          mask: 255.255.255.0
          gateway: 10.2.0.1
          status: up
      routing:
        enabled: false
        routes: []
        svis: []
  links:
    - id: link1
      from:
        device: hq-host
        interface: eth0
      to:
        device: hq-firewall
        interface: port1
    - id: link2
      from:
        device: hq-firewall
        interface: tunnel0
      to:
        device: branch-firewall
        interface: tunnel0
    - id: link3
      from:
        device: branch-firewall
        interface: port1
      to:
        device: branch-host
        interface: eth0
injected_fault:
  device: branch-firewall
  field: firewallPolicies
  value:
    - id: 1
      srcSubnet: 10.2.0.0/24
      dstSubnet: 0.0.0.0/0
      action: permit
      interface: port2
  action: set
ticket:
  title: IPsec tunnel up but no traffic crosses
  symptom: >-
    The IPsec tunnel between HQ (10.1.0.0/24) and Branch (10.2.0.0/24) shows phase 1 and phase 2 up.
    However, HQ-PC cannot ping BR-PC (10.2.0.10). The tunnel interface is up on both sides.
  affected_hosts:
    - hq-host
win_condition:
  type: ping
  source: hq-host
  destination: 10.2.0.10
  expected: success
reference_solution:
  - device: branch-firewall
    commands:
      - configure terminal
      - set firewall policy 10.1.0.0/24 10.2.0.0/24 permit interface tunnel0
      - end
layout:
  hq-host:
    x: 50
    'y': 80
  hq-firewall:
    x: 200
    'y': 150
  branch-firewall:
    x: 400
    'y': 150
  branch-host:
    x: 550
    'y': 80
