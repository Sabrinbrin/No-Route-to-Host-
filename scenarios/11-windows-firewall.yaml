ticket:
  title: Can't ping the file server
  symptom: >-
    AdminPC (172.16.0.50) cannot ping FileSrv (172.16.1.20). SMB file sharing and RDP both work fine
    to FileSrv. The server was recently migrated to a new VLAN and the admin re-applied Group
    Policy. Other Windows servers in the same subnet respond to ping.
  affected_hosts:
    - admin-pc
win_condition:
  type: ping
  source: admin-pc
  destination: 172.16.1.20
  expected: success
reference_solution:
  - device: file-server
    commands:
      - Set-NetFirewallRule -Name AllowICMP -Enabled True
layout:
  admin-pc:
    x: 80
    'y': 80
  core-sw:
    x: 300
    'y': 150
  file-server:
    x: 520
    'y': 80


explanation:
  why: >-
    Windows Firewall had an "ICMP Echo Request" allow rule, but it was disabled (Enabled=False).
    The Domain profile default is Block Inbound, so without an active allow rule, ICMP was
    silently dropped. Re-enabling the rule restored ping.
  concept: >-
    Windows Firewall evaluates rules per-profile (Domain/Private/Public). Rules can exist but be
    disabled — "Get-NetFirewallRule" shows the Enabled status. Group Policy refreshes can disable
    rules, especially after domain migrations.
  production: >-
    After GP refreshes or domain changes, check "Get-NetFirewallRule | Where Enabled -eq False"
    for recently disabled rules. In production, also check if the firewall profile changed
    (Domain to Public) which applies different default rules.
